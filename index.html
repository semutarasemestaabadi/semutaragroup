<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT Semutara Semesta Abadi - Natural Sweeteners</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- UTILITY RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #114232; /* Hijau tua Semutara */
            --secondary-color: #D2A056; /* Emas hangat */
            --bg-light: #F7F4EF; /* Krem lembut */
            --text-dark: #2B2A27;
            --white: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
            background-color: var(--white);
            line-height: 1.6;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }

        /* --- HERO SECTION CONTAINER --- */
        .hero-section {
            position: relative;
            width: 100%;
            /* Menggunakan aspek rasio gambar asli (16:9) agar gambar tidak terpotong sama sekali */
            aspect-ratio: 16 / 9; 
            min-height: 550px; /* Batas minimum tinggi agar teks di HP tidak berantakan */
            background-image: url('main-banner.jpg'); 
            background-size: 100% 100%; /* Memaksa gambar pas penuh dari ujung ke ujung */
            background-position: center center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
        }

        /* Lapisan overlay gradasi halus agar teks kontras di atas gambar produk */
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.65) 0%, rgba(0, 0, 0, 0.35) 50%, rgba(0, 0, 0, 0.15) 100%);
            z-index: 1;
        }

        /* --- NAVBAR DI DALAM HERO (TRANSPARAN) --- */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%; 
            /* Memberikan gradasi gelap transparan sangat tipis di atas agar teks menu putih terlihat jelas */
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%); 
        }

        /* PERBAIKAN: Mengatur lebar logo menjadi 200px sesuai permintaan */
        .logo img {
            width: 200px; /* Diubah menjadi 200px pas */
            height: auto; /* Tinggi otomatis menyesuaikan proporsi asli logo */
            object-fit: contain;
            display: block;
            /* Trik CSS untuk menyaring dan menghapus background putih pada gambar logo */
            mix-blend-mode: multiply; 
            filter: contrast(1.1); /* Meningkatkan kontras warna logo setelah backgroundnya hilang */
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #FFFFFF; 
            font-weight: 600;
            font-size: 14px;
            margin-left: 28px;
            text-transform: uppercase;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        nav a:hover, nav a.active {
            color: var(--secondary-color);
        }

        /* --- TEKS HERO MELAYANG --- */
        .hero-body {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            align-items: center;
            padding: 20px 8%;
            margin-top: -35px; /* Penyesuaian keseimbangan posisi teks */
        }

        .hero-content {
            max-width: 600px;
            color: var(--white);
        }

        .hero-content h1 {
            font-size: 48px;
            color: #F4EFE3;
            line-height: 1.2;
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .hero-content h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 20px;
            color: var(--secondary-color);
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        .hero-content p {
            font-size: 15px;
            color: #E8E2D5;
            margin-bottom: 30px;
            max-width: 500px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
        }

        /* Tombol */
        .btn-container {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--white);
        }

        .btn-primary:hover {
            background-color: #0b2b21;
        }

        .btn-secondary {
            background-color: var(--secondary-color);
            color: var(--white);
        }

        .btn-secondary:hover {
            background-color: #bc8e45;
        }

        /* --- ABOUT US SECTION --- */
        .about {
            display: flex;
            align-items: center;
            padding: 100px 8%;
            background-color: var(--bg-light);
            gap: 80px;
        }

        .about-image {
            flex: 1;
        }

        .about-image img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
        }

        .about-content {
